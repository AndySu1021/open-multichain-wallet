<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>狐錢包 — Figma Prototype</title>
<style>
  :root{
    --mm-orange:#f6851b;        /* fox orange */
    --mm-orange-deep:#e2761b;
    --mm-blue:#037dd6;
    --ink:#24272a;              /* near-black ink */
    --ink-2:#535a61;
    --line:#d6d9dc;
    --line-soft:#e7eaed;
    --bg:#f2f4f6;               /* cool grey canvas */
    --card:#ffffff;
    --green:#28a745;
    --red:#d73a49;
    --warn-bg:#fef5e7;
    --warn-ink:#9a6700;
    --radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(36,39,42,.06);
    --shadow-pop:0 12px 40px rgba(36,39,42,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Euclid Circular B","Segoe UI",system-ui,-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;}
  /* ---- Figma stage chrome ---- */
  .stage-head{max-width:1180px;margin:0 auto;padding:28px 24px 8px;}
  .stage-head h1{font-size:20px;margin:0 0 2px;letter-spacing:-.01em;}
  .stage-head h1 b{color:var(--mm-orange-deep)}
  .stage-head p{margin:0;color:var(--ink-2);font-size:13px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--ink-2)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%}
  .canvas{max-width:1180px;margin:0 auto;padding:20px 24px 80px;
    display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:40px 28px;}
  .frame{display:flex;flex-direction:column}
  .frame-label{font-size:12px;color:var(--ink-2);margin:0 2px 8px;display:flex;justify-content:space-between;align-items:center}
  .frame-label .num{font-variant-numeric:tabular-nums;color:var(--mm-orange-deep);font-weight:600}
  /* ---- device ---- */
  .device{width:340px;height:680px;background:var(--card);border-radius:26px;
    box-shadow:var(--shadow);overflow:hidden;position:relative;border:1px solid var(--line-soft);
    display:flex;flex-direction:column;margin:0 auto;}
  .topbar{height:30px;display:flex;align-items:center;justify-content:center;gap:5px;
    background:#fafbfc;border-bottom:1px solid var(--line-soft);flex:0 0 auto}
  .topbar i{width:5px;height:5px;border-radius:50%;background:var(--line)}
  .screen{flex:1;overflow-y:auto;overflow-x:hidden}
  .screen::-webkit-scrollbar{width:0}
  .pad{padding:18px 18px 22px}
  /* ---- nav header inside app ---- */
  .apphead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line-soft)}
  .net{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);
    border-radius:999px;padding:5px 11px 5px 8px;font-size:12.5px;font-weight:600;cursor:pointer}
  .net .chip{width:18px;height:18px;border-radius:50%;display:inline-block}
  .net svg{width:11px;height:11px;opacity:.5}
  .avatar{width:30px;height:30px;border-radius:50%;
    background:conic-gradient(from 30deg,#f6851b,#ffc56e,#037dd6,#6b3fa0,#f6851b);cursor:pointer}
  /* ---- typography helpers ---- */
  h2.t{font-size:18px;margin:0 0 14px;letter-spacing:-.01em}
  .muted{color:var(--ink-2)}
  .center{text-align:center}
  /* ---- buttons ---- */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    border:none;border-radius:999px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer;
    font-family:inherit;transition:transform .08s ease, filter .15s ease}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--mm-orange);color:#fff}
  .btn-primary:hover{filter:brightness(1.04)}
  .btn-dark{background:var(--ink);color:#fff}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:#b9bdc1}
  .btn-row{display:flex;gap:10px}
  .btn-sm{padding:10px;font-size:13px}
  /* ---- inputs ---- */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;margin:0 0 6px;color:var(--ink-2)}
  .input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 13px;font-size:14px;font-family:inherit;background:#fff}
  .input:focus{outline:2px solid #f6851b40;border-color:var(--mm-orange)}
  /* ---- social login ---- */
  .sbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    border:1px solid var(--line);background:#fff;border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:inherit}
  .sbtn:hover{background:#fafbfc}
  .sbtn svg{width:18px;height:18px}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--ink-2);font-size:12px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line-soft)}
  /* ---- balance card ---- */
  .balance{background:linear-gradient(160deg,#fff 0%,#fff 60%);border:1px solid var(--line-soft);
    border-radius:var(--radius);padding:20px 18px;text-align:center;box-shadow:var(--shadow)}
  .balance .label{font-size:12px;color:var(--ink-2);font-weight:600;letter-spacing:.02em}
  .balance .amt{font-size:34px;font-weight:700;letter-spacing:-.02em;margin:6px 0 2px;font-variant-numeric:tabular-nums}
  .balance .delta{font-size:13px;font-weight:600;color:var(--green)}
  .addr-pill{display:inline-flex;align-items:center;gap:7px;background:#f2f4f6;border-radius:999px;
    padding:6px 12px;font-size:12px;color:var(--ink-2);margin-top:12px;cursor:pointer}
  .actions{display:flex;justify-content:space-between;gap:8px;margin:16px 0 4px}
  .act{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
  .act .ic{width:46px;height:46px;border-radius:50%;background:var(--mm-orange);color:#fff;
    display:flex;align-items:center;justify-content:center}
  .act .ic.alt{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .act span{font-size:12px;font-weight:600}
  .act.disabled{opacity:.38;cursor:not-allowed;pointer-events:none;position:relative}
  .act.disabled span::after{content:"即將推出";position:absolute;left:0;right:0;bottom:-13px;font-size:8.5px;font-weight:600;color:var(--ink-2)}
  /* ---- token list ---- */
  .tabs{display:flex;gap:4px;margin:18px 0 10px;border-bottom:1px solid var(--line-soft)}
  .tab{padding:9px 4px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;border-bottom:2px solid transparent;margin-right:18px}
  .tab.on{color:var(--ink);border-color:var(--mm-orange)}
  .row{display:flex;align-items:center;gap:12px;padding:11px 2px;cursor:pointer;border-radius:10px}
  .row:hover{background:#fafbfc}
  .coin{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex:0 0 auto}
  .coin.btc{background:#f7931a}.coin.eth{background:#627eea}.coin.xrp{background:#23292f}
  .coin.usdc{background:#2775ca}.coin.usdt{background:#26a17b}
  .row .nm{flex:1;min-width:0}
  .row .nm b{display:block;font-size:14px}
  .row .nm small{color:var(--ink-2);font-size:12px}
  .row .vl{text-align:right}
  .row .vl b{display:block;font-size:14px;font-variant-numeric:tabular-nums}
  .row .vl small{color:var(--ink-2);font-size:12px}
  /* ---- bottom nav ---- */
  .botnav{display:flex;border-top:1px solid var(--line-soft);background:#fff;flex:0 0 auto}
  .botnav a{flex:1;text-align:center;padding:10px 0 12px;font-size:10.5px;color:var(--ink-2);cursor:pointer;text-decoration:none}
  .botnav a.on{color:var(--mm-orange-deep)}
  .botnav a svg{display:block;margin:0 auto 3px;width:20px;height:20px}
  /* ---- send / receive ---- */
  .net-pick{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;cursor:pointer}
  .qr{width:180px;height:180px;margin:8px auto 16px;background:
     repeating-linear-gradient(0deg,#24272a 0 8px,#fff 8px 16px),
     repeating-linear-gradient(90deg,#24272a 0 8px,transparent 8px 16px);
     background-blend-mode:multiply;border-radius:14px;border:6px solid #fff;box-shadow:var(--shadow);
     -webkit-mask:radial-gradient(#000,#000);position:relative}
  .qr::after{content:"🦊";position:absolute;inset:0;margin:auto;width:42px;height:42px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .warn{background:var(--warn-bg);color:var(--warn-ink);border-radius:10px;padding:11px 12px;font-size:12px;line-height:1.5;display:flex;gap:8px}
  .summary{background:#fafbfc;border:1px solid var(--line-soft);border-radius:12px;padding:14px;margin:14px 0;font-size:13px}
  .summary div{display:flex;justify-content:space-between;padding:5px 0}
  .summary div span:last-child{font-weight:600;font-variant-numeric:tabular-nums}
  /* ---- tx history ---- */
  .daygroup{font-size:12px;font-weight:600;color:var(--ink-2);margin:16px 0 6px}
  .tx{display:flex;align-items:center;gap:12px;padding:11px 2px;cursor:pointer}
  .tx .ti{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f2f4f6;flex:0 0 auto}
  .tx .info{flex:1}.tx .info b{display:block;font-size:13.5px}.tx .info small{color:var(--ink-2);font-size:11.5px}
  .tx .val{text-align:right;font-variant-numeric:tabular-nums;font-size:13.5px;font-weight:600}
  .tx .val.out{color:var(--ink)}.tx .val.in{color:var(--green)}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;background:#e9f7ee;color:var(--green)}
  .badge.pend{background:#fff4e5;color:#b06a00}
  /* network sheet */
  .sheet-net .row .coin{font-size:12px}
  /* toggle switch */
  .tg{width:40px;height:23px;border-radius:999px;background:var(--line);position:relative;transition:background .18s ease;flex:0 0 auto}
  .tg span{position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .18s ease}
  .tg.on{background:var(--green)}
  .tg.on span{left:19px}
  /* connectors */
  .flowline{display:none}
</style>

<div class="stage-head">
  <h1>🦊 <b>狐錢包</b> WebWallet — 互動原型 <span style="font-weight:400;color:var(--ink-2);font-size:14px">v0.1 / 託管式</span></h1>
  <p>可點擊的 Figma 風原型。點任何按鈕都會跳到對應畫面；橘色 = 主要動作。這是設計稿，非真實錢包。</p>
  <div class="legend">
    <span><i class="dot" style="background:var(--mm-orange)"></i>主要 CTA</span>
    <span><i class="dot" style="background:var(--ink)"></i>次要動作</span>
    <span><i class="dot" style="background:var(--line)"></i>導覽 / 返回</span>
    <span class="muted">提示：點底部導覽列可在 Dashboard / 紀錄 間切換</span>
  </div>
</div>

<div class="canvas" id="canvas"></div>

<script>
/* ---------- shared chrome ---------- */
const topbar = `<div class="topbar"><i></i><i></i><i></i></div>`;
const net = (name,cls) => `<div class="net" onclick="go('s_network')"><span class="chip coin ${cls}" style="width:18px;height:18px"></span>${name}<svg viewBox="0 0 12 12"><path d="M3 4.5 6 7.5 9 4.5" stroke="currentColor" stroke-width="1.6" fill="none"/></svg></div>`;
const apphead = (n,c)=>`<div class="apphead">${net(n,c)}<div class="avatar" onclick="go('s_account')"></div></div>`;
const botnav = (active)=>`<div class="botnav">
  <a class="${active==='home'?'on':''}" onclick="go('s_dashboard')">${ic_home}首頁</a>
  <a class="${active==='tx'?'on':''}" onclick="go('s_history')">${ic_clock}紀錄</a>
  <a onclick="go('s_receive')">${ic_qr}收款</a>
  <a onclick="go('s_account')">${ic_user}我的</a>
</div>`;

/* tiny inline icons */
const ic_home=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10 12 3l9 7v10a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>`;
const ic_clock=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`;
const ic_qr=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3M21 14v7h-7"/></svg>`;
const ic_user=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>`;
const ic_send=`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`;
const ic_recv=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`;
const ic_buy=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`;
const ic_swap=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10 4 7l3-3M4 7h13M17 14l3 3-3 3M20 17H7"/></svg>`;
const gGoogle=`<svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 6.1 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.2-.1-2.3-.3-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 7 29.4 5 24 5 16.3 5 9.7 9.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.2 35 26.7 36 24 36c-5.3 0-9.7-3.1-11.3-7.6l-6.5 5C9.6 39.7 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.5l6.3 5.3C40.7 35.9 44 30.5 44 24c0-1.2-.1-2.3-.4-3.5z"/></svg>`;

/* icons used inside screen templates — must be defined before screens are built */
const ic_send_ink=`<svg viewBox="0 0 24 24" fill="none" stroke="var(--mm-orange-deep)" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`;
const ic_recv_ink=`<svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`;
const ic_swap_ink=`<svg viewBox="0 0 24 24" fill="none" stroke="var(--ink-2)" stroke-width="2"><path d="M7 10 4 7l3-3M4 7h13M17 14l3 3-3 3M20 17H7"/></svg>`;

/* ---------- SCREENS ---------- */
const S = {};

/* 1. Welcome */
S.s_welcome = {label:"01 · 歡迎 / 入口", html:`
${topbar}
<div class="screen"><div class="pad center" style="display:flex;flex-direction:column;height:100%;justify-content:center">
  <div style="font-size:64px;margin-bottom:6px">🦊</div>
  <h2 class="t" style="font-size:24px;margin-bottom:6px">狐錢包</h2>
  <p class="muted" style="margin:0 0 32px;font-size:14px">一個錢包，管理 BTC · ETH · ERC20 · XRP</p>
  <button class="btn btn-primary" onclick="go('s_login')">開始使用</button>
  <button class="btn btn-ghost" style="margin-top:10px" onclick="go('s_login')">我已有帳號</button>
  <p class="muted" style="font-size:11px;margin-top:28px;line-height:1.5">託管式錢包 · 私鑰由平台安全保管<br>登入即代表同意服務條款</p>
</div></div>`};

/* 2. Login */
S.s_login = {label:"02 · 登入 / 註冊", html:`
${topbar}
<div class="screen"><div class="pad">
  <div style="font-size:40px;margin:6px 0 12px">🦊</div>
  <h2 class="t">登入狐錢包</h2>
  <p class="muted" style="margin:-8px 0 22px;font-size:13px">選擇你慣用的方式，30 秒完成</p>
  <div class="sbtn" onclick="go('s_loading')">${gGoogle}使用 Google 繼續</div>
  <div class="divider">或用 email</div>
  <div class="field"><label>Email</label><input class="input" placeholder="you@example.com"></div>
  <div class="field"><label>密碼</label><input class="input" type="password" placeholder="••••••••"></div>
  <button class="btn btn-primary" onclick="go('s_loading')">登入</button>
  <p class="center muted" style="font-size:12.5px;margin-top:16px">還沒有帳號？<b style="color:var(--mm-orange-deep);cursor:pointer">註冊</b> · <span style="cursor:pointer">忘記密碼</span></p>
  <div class="warn" style="margin-top:18px">🔒 託管式設計：你不需要保管助記詞，帳號還原透過 email 驗證。資產安全由平台負責。</div>
</div></div>`};

/* 2b. loading */
S.s_loading = {label:"02b · 驗證中", html:`
${topbar}
<div class="screen"><div class="pad center" style="display:flex;flex-direction:column;height:100%;justify-content:center;gap:16px">
  <div class="avatar" style="width:54px;height:54px;margin:0 auto;animation:spin 1.1s linear infinite"></div>
  <p style="font-weight:600">正在驗證並準備你的錢包…</p>
  <p class="muted" style="font-size:12px">建立安全連線 · 同步四條鏈的餘額</p>
  <button class="btn btn-ghost btn-sm" style="width:auto;margin:8px auto 0;padding:8px 20px" onclick="go('s_dashboard')">▶ 模擬完成（進入 App）</button>
</div></div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>`};

/* 3. Dashboard */
S.s_dashboard = {label:"03 · 資產總覽 Dashboard", html:`
${topbar}${apphead('全部網路','eth')}
<div class="screen"><div class="pad">
  <div class="balance">
    <div class="label">總資產估值</div>
    <div class="amt">$48,213.90</div>
    <div class="delta">▲ $1,204.52 (2.56%) 今日</div>
    <div class="addr-pill" onclick="go('s_receive')">🦊 0xA4f1…9bE2 <span style="font-size:13px">⧉</span></div>
  </div>
  <div class="actions">
    <div class="act" onclick="go('s_send')"><div class="ic">${ic_send}</div><span>Send</span></div>
    <div class="act" onclick="go('s_receive')"><div class="ic alt">${ic_recv}</div><span>Receive</span></div>
    <div class="act disabled"><div class="ic alt">${ic_buy}</div><span>Buy</span></div>
    <div class="act disabled"><div class="ic alt">${ic_swap}</div><span>Swap</span></div>
  </div>
  <div class="tabs"><div class="tab on">代幣</div><div class="tab" onclick="go('s_history')">活動</div></div>
  ${tokenRow('btc','BTC','Bitcoin','0.412 BTC','$28,140.00','+1.9%')}
  ${tokenRow('eth','ETH','Ethereum','4.83 ETH','$15,620.40','+3.1%')}
  ${tokenRow('usdc','USDC','USD Coin · ERC20','3,200 USDC','$3,200.00','0.0%')}
  ${tokenRow('usdt','USDT','Tether · ERC20','—','$0.00','')}
  ${tokenRow('xrp','XRP','XRP Ledger','1,540 XRP','$1,253.50','-0.7%')}
</div></div>
${botnav('home')}`};

/* 4. Send – step address/amount */
S.s_send = {label:"04 · Send（金額 / 收款人）", html:`
${topbar}
<div class="apphead"><div class="net" onclick="go('s_dashboard')"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5l-7 7 7 7"/></svg>返回</div><b style="font-size:15px">傳送</b><span style="width:30px"></span></div>
<div class="screen"><div class="pad">
  <div class="field"><label>網路（鏈）</label>
    <div class="net-pick" onclick="go('s_network')"><span class="coin eth" style="width:26px;height:26px;font-size:11px">Ξ</span><div style="flex:1"><b style="font-size:14px">Ethereum</b><br><small class="muted">ERC20 代幣也走這條</small></div><svg viewBox="0 0 12 12" width="12" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 4.5 6 7.5 9 4.5"/></svg></div>
  </div>
  <div class="field"><label>收款地址</label><input class="input" placeholder="0x… 或貼上 / 掃描"></div>

/* ---------- partials ---------- */
function tokenRow(cls,sym,name,bal,usd,chg){
  const chgCol = chg.startsWith('-')?'var(--red)':(chg==='0.0%'||chg===''?'var(--ink-2)':'var(--green)');
  const init = sym==='BTC'?'₿':sym==='ETH'?'Ξ':sym==='XRP'?'✕':sym.slice(0,2);
  return `<div class="row" onclick="go('s_send')">
    <div class="coin ${cls}">${init}</div>
    <div class="nm"><b>${sym}</b><small>${name}</small></div>
    <div class="vl"><b>${usd}</b><small style="color:${chgCol}">${bal}${chg?' · '+chg:''}</small></div>
  </div>`;
}
const ic_send_ink_dup=`<svg viewBox="0 0 24 24" fill="none" stroke="var(--mm-orange-deep)" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`;
function tx(type,title,sub,val,dir,st,stTxt){
  const i = type==='send'?ic_send_ink:type==='recv'?ic_recv_ink:ic_swap_ink;
  return `<div class="tx" onclick="go('s_tx_detail')">
    <div class="ti">${i}</div>
    <div class="info"><b>${title}</b><small>${sub} · <span class="badge ${st==='pend'?'pend':''}">${stTxt}</span></small></div>
    <div class="val ${dir}">${val}</div>
  </div>`;
}
function netRow(cls,name,sub,check){
  const init = cls==='btc'?'₿':cls==='eth'?'Ξ':cls==='xrp'?'✕':cls.slice(0,2).toUpperCase();
  return `<div class="row" onclick="go('s_dashboard')">
    <div class="coin ${cls}">${init}</div>
    <div class="nm"><b>${name}</b><small>${sub}</small></div>
    <div class="vl" style="color:var(--mm-orange-deep);font-weight:700">${check}</div>
  </div>`;
}
function setRow(emo,t,s,target){
  return `<div class="row" style="padding:13px 2px" onclick="go('${target}')">
    <div class="ti" style="width:36px;height:36px;border-radius:9px;background:#f2f4f6;display:flex;align-items:center;justify-content:center">${emo}</div>
    <div class="nm" style="margin-left:10px"><b>${t}</b><small>${s}</small></div>
    <div class="muted">›</div>
  </div>`;
}
function toggleRow(emo,t,s,on,chevron){
  const ctrl = chevron
    ? '<div class="muted">›</div>'
    : `<div class="tg ${on?'on':''}"><span></span></div>`;
  return `<div class="row" style="padding:13px 2px;cursor:${chevron?'pointer':'default'}">
    <div class="ti" style="width:36px;height:36px;border-radius:9px;background:#f2f4f6;display:flex;align-items:center;justify-content:center">${emo}</div>
    <div class="nm" style="margin-left:10px"><b>${t}</b><small>${s}</small></div>
    ${ctrl}
  </div>`;
}
function faqRow(q){
  return `<div class="row" style="padding:13px 2px;cursor:pointer">
    <div class="nm"><b style="font-weight:500;font-size:13.5px">${q}</b></div>
    <div class="muted">›</div>
  </div>`;
}

/* ---------- render all frames ---------- */
const order = ['s_welcome','s_login','s_loading','s_dashboard','s_send','s_send_confirm','s_send_done','s_receive','s_history','s_tx_detail','s_network','s_account','s_security','s_support'];
const canvas = document.getElementById('canvas');
order.forEach(id=>{
  const f = document.createElement('div'); f.className='frame';
  f.innerHTML = `<div class="frame-label"><span>${S[id].label.replace(/^(\d+\w*) · /, (m,n)=>`<span class="num">${n}</span> · `)}</span></div>
    <div class="device" id="${id}">${S[id].html}</div>`;
  canvas.appendChild(f);
});
function go(id){
  const el = document.getElementById(id);
  if(el){ el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
    el.animate([{boxShadow:'0 0 0 3px #f6851b'},{boxShadow:'var(--shadow)'}],{duration:900}); }
}
</script>
